<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event bubbling</title>
</head>
<style>
    /* Event Bubbling */
    .child{
        background-color: aliceblue;
        border: 2px solid black;
        padding: 14px ;
        margin: 14px;
    }
    .childconatiner{
        background-color: rgb(112, 154, 191);
        border: 2px solid black;
        padding: 14px ;
        margin: 14px;
    }
    .conatiner{
        background-color: aliceblue;
        border: 2px solid black;
        padding: 14px ;
        margin: 14px;
    }
</style>
<body>
    <div class="conatiner">
        <section class="childconatiner">
            <div class="child">
                I am A Child
            </div>
        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click",(e)=>{
            e.stopPropagation
    alert("child was click ")
 })

 document.querySelector(".childconatiner").addEventListener("cclick",(e)=>{
    e.stopPropagation
    alert("childconatiner was clicked ")
 })

 document.querySelector(".conatiner").addEventListener("click",(e)=>{
    e.stopPropagation
    alert("conatiner was chicked ")
 })

//  set interval is doing like repate the same as you set the time

 setInterval(()=>{
    document.querySelector(".childconatiner").style.background="red"
 }, 3000);


    </script>
</body>
</html>
